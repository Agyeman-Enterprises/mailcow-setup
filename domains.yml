# Source of truth for product-domain onboarding to the Agyeman Enterprises mail stack.
#
# Edit this file, commit, push. The `Onboard domains` workflow reconciles the state
# via scripts/reconcile.py → scripts/onboard-domain.py.
#
# Modes:
#   full   — MX swapped to Mailcow (inbound goes to mail.agyemanenterprises.com)
#   stage  — MX left alone (CF Email Routing or Google W/S keeps handling inbound).
#            Still gets Mailcow registration + DKIM + Resend + SPF-with-CF-include + mail.A.
#   skip   — ignored entirely. Use for the holding-co domain so automation never touches it.
#
# NEVER add agyemanenterprises.com with mode full/stage. It is the Google W/S holding-co
# inbox — MUST stay outside Mailcow. The onboard script refuses it anyway.

holding_company:
  - { domain: agyemanenterprises.com, mode: skip, note: "Google Workspace — DO NOT onboard" }

# Fully migrated to Mailcow (MX -> mail.agyemanenterprises.com)
